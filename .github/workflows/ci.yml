name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      # The `tijuana-dispersion` dep is a Git VCS pin to a private repo. CI
      # doesn't need it for lint/format/secret checks, and the runner has no
      # cross-repo credentials by default — so skip it here. To enable full
      # installs in CI later, add a PAT secret with repo scope and configure
      # git insteadOf to use it.
      - run: uv sync --extra dev
      - name: ruff format check
        run: uv run ruff format --check .
      - name: ruff lint
        run: uv run ruff check .
      - name: detect-secrets
        run: |
          uv run detect-secrets-hook \
            --baseline .secrets.baseline \
            $(git ls-files | grep -v '^.secrets.baseline$') || \
            (echo "::error::Possible secret detected. Audit .secrets.baseline." && exit 1)

  no-synthetic-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for np.random in non-test code
        run: |
          # Scan emissions_research and any analysis script for unannotated
          # random use. The checker script itself (scripts/check_no_mock_data.py)
          # contains these patterns by design — exclude it.
          violations=$(grep -rEn 'np\.random\.|numpy\.random\.' \
              emissions_research/ scripts/ nrp/ 2>/dev/null \
              --exclude=check_no_mock_data.py \
              | grep -v '# random ok:' || true)
          if [ -n "$violations" ]; then
            echo "::error::np.random usage outside tests without '# random ok: <reason>' annotation"
            echo "$violations"
            exit 1
          fi

      - name: Check for placeholder data fallbacks
        run: |
          # Patterns that suggest silent fallback to fake data. The checker
          # script itself defines these patterns; exclude it.
          pattern='return\s+(0|0\.0|np\.zeros|\[\])\s*#.*placeholder|mock_|fake_|dummy_'
          violations=$(grep -rEn "$pattern" emissions_research/ scripts/ 2>/dev/null \
            --exclude=check_no_mock_data.py \
            | grep -v '# random ok:' || true)
          if [ -n "$violations" ]; then
            echo "::warning::Possible synthetic-data fallback patterns detected (review):"
            echo "$violations"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      # See lint job: skip the private `tijuana-dispersion` dep in CI. When
      # the test suite grows to exercise that dep, add a PAT secret and
      # remove this flag.
      - run: uv sync --extra dev
      - name: pytest (collect-only)
        run: uv run pytest --co -q || true
      - name: pytest run
        # pytest returns exit code 5 when no tests are collected; the
        # experiments repo is allowed to have zero tests in `tests/` and
        # `emissions_research/` while it's still in scaffolding phase.
        run: |
          set +e
          uv run pytest
          rc=$?
          if [ $rc -eq 0 ] || [ $rc -eq 5 ]; then
            exit 0
          else
            exit $rc
          fi

  notebooks-stripped:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv tool install nbstripout
      - name: Verify notebooks are stripped
        run: |
          # nbstripout in check mode: returns nonzero if any notebook has non-stripped output
          for nb in $(find . -name '*.ipynb' -not -path '*/.*' -not -path '*/output/*'); do
            if ! uv tool run nbstripout --verify "$nb" 2>/dev/null; then
              echo "::error::Notebook $nb has un-stripped outputs; run nbstripout"
              exit 1
            fi
          done
