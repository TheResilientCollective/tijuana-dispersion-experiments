# calibration v3 — diurnal modifier on emissions

experiment:
  name: calibration_v3
  date: 2026-05-11
  description: |
    Add f_diel(t) to the emissions parameterization. Fit diel_amplitude
    and diel_phase_hours jointly with per-source baselines on a Feb-Mar
    training window; evaluate on an Apr holdout. Compare against v2
    (no diel modifier) on the same windows.

# Train + holdout windows. Times are tz-naive (interpreted as America/Los_Angeles).
windows:
  train:
    start: "2026-02-01T00:00:00"
    end:   "2026-04-01T00:00:00"
  holdout:
    start: "2026-04-01T00:00:00"
    end:   "2026-04-15T00:00:00"
  quick:                        # used when run.py is invoked with --quick
    start: "2026-03-13T00:00:00"
    end:   "2026-03-16T00:00:00"

receptors:
  - SAN YSIDRO
  - NESTOR - BES
  - IB CIVIC CTR

sources:
  channel:
    n_sources: 12
    start_lat: 32.54064
    start_lon: -117.05801
    end_lat: 32.555
    end_lon: -117.115
    seed_rate_g_s: 0.1
  estuary_grid:
    nx: 3
    ny: 3
    bbox: [32.555, -117.135, 32.580, -117.115]
    seed_rate_g_s: 0.1

backend:
  type: gaussian_plume

calibration:
  # Inner step (bounded NNLS on per-source baselines, conditional on outer params)
  prior_lambda: 0.5
  smoothness_lambda: 0.3

  # Outer step (scipy.optimize.minimize over diel params)
  outer:
    diel_amplitude:
      initial: 1.5
      bounds: [1.0, 3.5]        # 1.0 = no diel; 3.5 ≈ 7× nocturnal vs daytime peak
    diel_phase_hours:
      initial: 4.0
      bounds: [0.0, 24.0]
    method: Nelder-Mead         # bound-respecting via clamp inside objective
    maxiter: 200
    xatol: 0.05
    fatol: 1.0e-3

data:
  modeldata_h2s_nofill: ../../data/modeldata_h2s_nofill.parquet

package_pin:
  tijuana_dispersion: v0.3.0

seed: 42
