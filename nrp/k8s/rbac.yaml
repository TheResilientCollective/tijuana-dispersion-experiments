# Service account + least-privilege RBAC for the Dagster K8sRunLauncher
# / k8s_job_executor on NRP. Matches serviceAccountName: dagster-nrp in
# nrp/k8s/job_template.yaml and the executor config in
# nrp/dagster_pipeline.py.
#
# Apply (namespace is supplied at apply time so this file is reusable):
#   kubectl apply -f nrp/k8s/rbac.yaml -n ucsd-center4health
#
# Verify:
#   kubectl get sa dagster-nrp -n ucsd-center4health
#   kubectl auth can-i create jobs -n ucsd-center4health \
#     --as=system:serviceaccount:ucsd-center4health:dagster-nrp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dagster-nrp
  labels:
    app.kubernetes.io/part-of: tijuana-dispersion-experiments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster-nrp
  labels:
    app.kubernetes.io/part-of: tijuana-dispersion-experiments
rules:
  # Dagster creates one Job per run/step and watches it to completion,
  # then GCs it (ttlSecondsAfterFinished in job_template.yaml).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Step pods + their logs (run monitoring / failure sensor messages).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # The launcher reads the env Secret/ConfigMap it injects into steps.
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster-nrp
  labels:
    app.kubernetes.io/part-of: tijuana-dispersion-experiments
subjects:
  - kind: ServiceAccount
    name: dagster-nrp
roleRef:
  kind: Role
  name: dagster-nrp
  apiGroup: rbac.authorization.k8s.io
